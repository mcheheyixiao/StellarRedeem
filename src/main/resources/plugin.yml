name: StellarRedeem
version: '${version}'
main: org.stellarvan.stellarRedeem.StellarRedeem
api-version: '1.21'
folia-supported: false
commands:
  redeem:
    description: Redeem a gift code
    usage: /redeem <code>
    aliases:
      - cdkey
      - key
  stellarredeem:
    description: StellarRedeem admin command
    usage: /stellarredeem <help|reload|status|doctor|testapi>
    aliases:
      - sreedeem
permissions:
  stellarredeem.redeem:
    default: true
  stellarredeem.admin:
    default: op
