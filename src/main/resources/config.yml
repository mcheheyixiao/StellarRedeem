api:
  base-url: "https://www.stellarvan.cn"
  server-id: "survival-1"
  server-secret: "CHANGE_ME"
  timeout-ms: 5000

redeem:
  cooldown-seconds: 5
  case-insensitive: true
  allow-console: false

command:
  stop-on-first-failure: true
  log-executed-commands: true

heartbeat:
  enabled: true
  interval-seconds: 60

debug:
  enabled: false

callback-retry:
  enabled: true
  file: "callback-queue.json"
  interval-seconds: 30
  max-attempts: 10
  max-queue-size: 500

context:
  include-world: true
  include-server-version: true
  include-online-players: true
  include-player-ip: false

messages:
  only-player: "&cThis command can only be used by players."
  no-permission: "&cYou do not have permission."
  usage: "&eUsage: /redeem <code>"
  cooldown: "&cPlease wait {seconds}s before redeeming again."
  processing: "&eVerifying code, please wait..."
  success: "&aRedeem success, rewards delivered."
  invalid: "&cInvalid, expired, or already used code."
  failed: "&cRedeem failed, please contact an admin."
  api-error: "&cRedeem service is temporarily unavailable. Try again later."
